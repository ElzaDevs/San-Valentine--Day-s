<style>
    /* Seção lateral */
.sidebar{
    position: absolute;
    left: 15px;
    top: 160px;

    width: 300px;
    height: 650px;

    background: rgba(255, 245, 250, 0.55);
    backdrop-filter: blur(3px);

    border: 3px dashed #f6a9d0;
    border-radius: 12px;

    padding: 20px;
    box-sizing: border-box;
}

/* Linhas decorativas */
.divider{
    width: 100%;
    text-align: center;
    color: #f3a8ca;
    font-size: 28px;
    margin: 20px 0;
    border-top: 2px dashed #f3a8ca;
    border-bottom: 2px dashed #f3a8ca;
    line-height: 0;
}

/* Menu */
.sidebar ul{
    list-style-image: url("https://chu-chuns.neocities.org/bouncing-heart.gif");
    list-style-position: inside;
    padding-left: 5px;
    font-family: 'Tangerine';
}

.sidebar li{
    margin: 18px 0;
}

.sidebar a{
    text-decoration: none;
    color: #f0a8ca;
    font-size: 36px;
    text-shadow: 0 0 4px #ffffff00;
    transition: 0.2s;
}

.sidebar a:hover{
    color: #ff69b4;
    padding-left: 8px;
}

/* Caixinha inferior */
.box{
    
    margin-top: 30px;
    padding: 12px;
    border: 2px dashed #f6b6d5;
    border-radius: 10px;
    text-align: center;
    color: #d978a8;
    background: rgba(255,255,255,0.25);
    font-family: 'Tangerine';
}
.mini-text{
    margin-top: 8px;
    font-size: 14px;
    color: #d978a8;
}    
</style>
